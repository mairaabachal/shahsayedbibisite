<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 80px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .button {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My First Web Page</h1>
        <p>This is a clean, simple website layout created with HTML and embedded CSS styling.</p>
        
        <h2>Key Features:</h2>
        <ul>
            <li>Mobile-friendly layout</li>
            <li>Clean typography</li>
            <li>Modern, soft shadows</li>
        </ul>

        <p>Ready to learn more? Click the button below to explore documentation.</p>
        <a href="more webs.html" target="_blank" class="button">Visit More Web Docs</a>
    </div>

</body>
</html>
